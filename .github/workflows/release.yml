name: Build and Release

# トリガー:
#   - "v" で始まるタグをpush → ビルドしてGitHub Releaseを自動作成
#   - 手動実行 (workflow_dispatch) → ビルドしてArtifactとして添付（リリースは作らない）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # Releaseの作成に必要

env:
  # Node.js 20搭載のJSアクションを今すぐNode.js 24で実行する公式opt-inフラグ。
  # 2026-06-02にデフォルト化、2026-09-16にNode.js 20は完全削除予定。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build mod JAR
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: aster_risk-jar
          path: build/libs/aster_risk-*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/aster_risk-*.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
