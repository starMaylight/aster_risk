name: Build and Release

# 手動トリガーのみ。Actions画面で "version" を入力して実行する。
# ビルドが成功すると、その入力値で v<version> タグのGitHub Releaseが自動作成される。
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン (例: 1.3.1) — タグは v<version>、JARは aster_risk-<version>-forge-1.20.1.jar'
        required: true
        type: string
        default: '1.3.1'
      prerelease:
        description: 'プレリリースとして作成する'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # Releaseの作成に必要

env:
  # Node.js 20搭載のJSアクションを今すぐNode.js 24で実行する公式opt-inフラグ。
  # 2026-06-02にデフォルト化、2026-09-16にNode.js 20は完全削除予定。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build mod JAR
        run: ./gradlew build --no-daemon --stacktrace -Pmod_version=${{ inputs.version }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: aster_risk-${{ inputs.version }}
          path: build/libs/aster_risk-*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          files: build/libs/aster_risk-*.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ inputs.prerelease }}
